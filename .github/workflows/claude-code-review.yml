name: Claude Code Review

on:
  # Run when someone comments "@claude" on a PR
  issue_comment:
    types: [created]
  # Manual trigger for testing from any branch
  workflow_dispatch:

jobs:
  claude-review:
    if: |
      github.event_name == 'workflow_dispatch' || (github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: anthropics/claude-code-action@b47fd721da662d48c5680e154ad16a73ed74d2e0 # v1.0.93
        env:
          TRACE_TO_LANGSMITH: "true"
          CC_LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          CC_LANGSMITH_PROJECT: "claude-code-review"
          CC_LANGSMITH_METADATA: |
            {
              "pr_url": "${{ github.event.pull_request.html_url || '' }}",
              "pr_number": "${{ github.event.pull_request.number || '' }}",
              "pr_author": "${{ github.event.pull_request.user.login || github.event.issue.user.login || '' }}",
              "repository": "${{ github.repository }}",
              "commit_sha": "${{ github.sha }}",
              "trigger": "${{ github.event_name }}"
            }
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          plugin_marketplaces: |
            https://github.com/nvnvyezi/langsmith-claude-code-plugins.git
          plugins: |
            langsmith-tracing@langsmith-claude-code-plugins
          prompt: |
            Please perform a code review on this pull request. Focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security concerns
            - Performance considerations

            Provide constructive feedback as comments on the PR.
